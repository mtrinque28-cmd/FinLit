<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wealthy Owl · Master Money, Build Wealth</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&display=swap" rel="stylesheet">
</head>
<body>
  <!-- Top nav -->
  <header class="topbar">
    <div class="brand" id="brandHome">
      <span class="brand-owl">🦉</span>
      <span class="brand-name">Wealthy Owl</span>
    </div>
    <nav class="top-stats">
      <div class="stat stat-streak" title="Day streak">
        <span class="stat-icon">🔥</span>
        <span id="streakVal">0</span>
      </div>
      <div class="stat stat-hearts" title="Hearts">
        <span class="stat-icon">❤️</span>
        <span id="heartsVal">5</span>
      </div>
      <div class="stat stat-networth" title="Your net worth">
        <span class="stat-icon">💰</span>
        <span class="stat-amount">$<span id="networthVal">0</span></span>
      </div>
      <button class="btn-reset" id="resetBtn" title="Reset progress">↺</button>
    </nav>
  </header>

  <!-- Main content -->
  <main class="app-main">
    <!-- Left: Unit navigator -->
    <aside class="sidebar-left" id="unitNav" aria-label="Learning units"></aside>

    <!-- Center: Lesson path -->
    <section class="content" id="content">
      <div class="unit-banner" id="unitBanner"></div>
      <div class="path-container" id="pathContainer"></div>
    </section>

    <!-- Right: Net worth mountain -->
    <aside class="sidebar-right" aria-label="Net worth progress">
      <div class="chart-title">Climb to <span class="gold">$1,000,000</span></div>
      <div class="mountain">
        <svg viewBox="0 0 200 500" preserveAspectRatio="none" class="mountain-svg">
          <defs>
            <linearGradient id="mountainGrad" x1="0" y1="1" x2="0" y2="0">
              <stop offset="0%" stop-color="#4ac97a"/>
              <stop offset="50%" stop-color="#3fb45f"/>
              <stop offset="100%" stop-color="#2e8b45"/>
            </linearGradient>
            <linearGradient id="skyGrad" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%" stop-color="#87ceeb"/>
              <stop offset="100%" stop-color="#d9f4ff"/>
            </linearGradient>
            <clipPath id="mountainClip">
              <polygon points="0,500 100,20 200,500" />
            </clipPath>
          </defs>
          <!-- Sky -->
          <rect x="0" y="0" width="200" height="500" fill="url(#skyGrad)"/>
          <!-- Snow mountain outline -->
          <polygon points="0,500 100,20 200,500" fill="#e6e6e6" stroke="#b8b8b8" stroke-width="1"/>
          <!-- Fill (green) driven by JS: height 500 - level -->
          <g clip-path="url(#mountainClip)">
            <rect id="mountainFill" x="0" y="500" width="200" height="0" fill="url(#mountainGrad)"/>
          </g>
          <!-- Cap accent -->
          <polygon points="70,120 100,20 130,120" fill="#ffffff" opacity="0.85"/>
          <!-- Climber -->
          <text id="climber" x="100" y="490" text-anchor="middle" font-size="28">🧗</text>
          <!-- Peak flag -->
          <text x="100" y="18" text-anchor="middle" font-size="14">🚩</text>
        </svg>
        <div class="milestone-labels" id="milestoneLabels"></div>
      </div>
      <div class="networth-summary">
        <div class="networth-current">$<span id="networthBig">0</span></div>
        <div class="networth-bar-wrap">
          <div class="networth-bar" id="networthBar"></div>
        </div>
        <div class="networth-goal">of $1,000,000</div>
        <div class="lessons-done"><span id="lessonsDone">0</span> / <span id="lessonsTotal">0</span> lessons</div>
      </div>
    </aside>
  </main>

  <!-- Lesson modal -->
  <div class="lesson-overlay hidden" id="lessonOverlay" aria-hidden="true">
    <div class="lesson-modal">
      <div class="lesson-topbar">
        <button class="close-x" id="closeLesson" aria-label="Close">✕</button>
        <div class="lesson-progress">
          <div class="lesson-progress-fill" id="lessonProgressFill"></div>
        </div>
        <div class="lesson-hearts">
          <span>❤️</span><span id="lessonHearts">5</span>
        </div>
      </div>

      <div class="lesson-body" id="lessonBody">
        <!-- Question rendered here -->
      </div>

      <div class="lesson-footer" id="lessonFooter">
        <div class="feedback" id="feedback"></div>
        <button class="btn-check" id="checkBtn" disabled>CHECK</button>
      </div>
    </div>
  </div>

  <!-- Toast / celebration -->
  <div class="toast hidden" id="toast"></div>

  <!-- Confetti canvas -->
  <canvas id="confettiCanvas"></canvas>

  <script src="data.js"></script>
  <script src="app.js"></script>
</body>
</html>
