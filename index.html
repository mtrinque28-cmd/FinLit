<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Denaro — Financial literacy</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet">
</head>
<body>
  <header class="topbar">
    <div class="brand" id="brandHome">
      <span class="brand-mark" aria-hidden="true">
        <svg viewBox="0 0 20 20" width="22" height="22" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
          <rect x="2.5" y="2.5" width="15" height="15" rx="4"/>
          <path d="M6.5 6.5h3.2a3.5 3.5 0 0 1 0 7H6.5V6.5z"/>
        </svg>
      </span>
      <span class="brand-name">Denaro</span>
    </div>
    <nav class="top-actions">
      <button class="btn-reset" id="resetBtn" title="Reset progress" aria-label="Reset">
        <svg viewBox="0 0 20 20" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
          <path d="M4 4v5h5"/>
          <path d="M4 9a7 7 0 1 1 2 5"/>
        </svg>
      </button>
    </nav>
  </header>

  <main class="app-main">
    <aside class="sidebar-left" id="unitNav" aria-label="Learning units"></aside>

    <section class="content" id="content">
      <div class="center-header">
        <div class="climb-strip">
          <div class="climb-header">
            <div class="climb-title">
              <span class="climb-eyebrow">Net worth</span>
              <span class="climb-current">$<span id="climbCurrent">0</span></span>
            </div>
            <div class="climb-stats">
              <span class="stat-block">
                <span class="stat-label">Goal</span>
                <span class="stat-value">$1,000,000</span>
              </span>
              <span class="stat-block">
                <span class="stat-label">Progress</span>
                <span class="stat-value"><span id="climbPct">0</span>%</span>
              </span>
              <span class="stat-block">
                <span class="stat-label">Lessons</span>
                <span class="stat-value"><span id="lessonsDone">0</span> / <span id="lessonsTotal">0</span></span>
              </span>
            </div>
          </div>
          <div class="climb-rail">
            <div class="climb-track">
              <div class="climb-fill" id="climbFill"></div>
              <div class="climb-marker" id="climbMarker" aria-hidden="true"></div>
            </div>
            <div class="climb-milestones" id="climbMilestones"></div>
          </div>
        </div>
        <div class="unit-banner" id="unitBanner"></div>
      </div>
      <div class="path-container" id="pathContainer"></div>
    </section>
  </main>

  <div class="lesson-overlay hidden" id="lessonOverlay" aria-hidden="true">
    <div class="lesson-modal">
      <div class="lesson-topbar">
        <button class="close-x" id="closeLesson" aria-label="Close">
          <svg viewBox="0 0 20 20" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M5 5l10 10M15 5L5 15"/>
          </svg>
        </button>
        <div class="lesson-progress">
          <div class="lesson-progress-fill" id="lessonProgressFill"></div>
        </div>
      </div>

      <div class="lesson-body" id="lessonBody"></div>

      <div class="lesson-footer" id="lessonFooter">
        <div class="feedback" id="feedback"></div>
        <button class="btn-check" id="checkBtn" disabled>Check</button>
      </div>
    </div>
  </div>

  <div class="toast hidden" id="toast"></div>

  <script src="data.js"></script>
  <script src="app.js"></script>
</body>
</html>
