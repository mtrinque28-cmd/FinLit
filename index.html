<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Denaro · Master Money, Build Wealth</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&display=swap" rel="stylesheet">
</head>
<body>
  <!-- Top nav -->
  <header class="topbar">
    <div class="brand" id="brandHome">
      <span class="brand-mark" aria-hidden="true">
        <svg viewBox="0 0 34 34" width="34" height="34">
          <defs>
            <linearGradient id="brandGrad" x1="0" y1="0" x2="1" y2="1">
              <stop offset="0%"  stop-color="#22c55e"/>
              <stop offset="100%" stop-color="#facc15"/>
            </linearGradient>
          </defs>
          <rect x="1" y="1" width="32" height="32" rx="10" fill="url(#brandGrad)"/>
          <text x="17" y="24" text-anchor="middle" font-family="Nunito, sans-serif" font-weight="900" font-size="20" fill="#0a0e1a">D</text>
        </svg>
      </span>
      <span class="brand-name">Denaro</span>
    </div>
    <nav class="top-stats">
      <div class="stat stat-streak" title="Day streak">
        <span class="stat-icon">🔥</span>
        <span id="streakVal">0</span>
      </div>
      <div class="stat stat-hearts" title="Hearts">
        <span class="stat-icon">❤️</span>
        <span id="heartsVal">5</span>
      </div>
      <div class="stat stat-networth" title="Your net worth">
        <span class="stat-icon">💰</span>
        <span class="stat-amount">$<span id="networthVal">0</span></span>
      </div>
      <button class="btn-reset" id="resetBtn" title="Reset progress">↺</button>
    </nav>
  </header>

  <!-- Main content -->
  <main class="app-main">
    <!-- Left: Unit navigator -->
    <aside class="sidebar-left" id="unitNav" aria-label="Learning units"></aside>

    <!-- Center: Lesson path -->
    <section class="content" id="content">
      <div class="unit-banner" id="unitBanner"></div>
      <div class="path-container" id="pathContainer"></div>
    </section>

    <!-- Right: Net worth mountain -->
    <aside class="sidebar-right" aria-label="Net worth progress">
      <div class="chart-title">Climb to <span class="gold">$1,000,000</span></div>
      <div class="mountain">
        <svg viewBox="0 0 200 500" preserveAspectRatio="none" class="mountain-svg">
          <defs>
            <linearGradient id="mountainGrad" x1="0" y1="1" x2="0" y2="0">
              <stop offset="0%"   stop-color="#22c55e"/>
              <stop offset="60%"  stop-color="#4ade80"/>
              <stop offset="100%" stop-color="#facc15"/>
            </linearGradient>
            <linearGradient id="skyGrad" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%"   stop-color="#0b1220"/>
              <stop offset="100%" stop-color="#141a2b"/>
            </linearGradient>
            <radialGradient id="starGrad" cx="0.5" cy="0.5" r="0.5">
              <stop offset="0%"   stop-color="#ffffff" stop-opacity="0.8"/>
              <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
            </radialGradient>
            <clipPath id="mountainClip">
              <polygon points="0,500 100,20 200,500" />
            </clipPath>
          </defs>
          <!-- Sky -->
          <rect x="0" y="0" width="200" height="500" fill="url(#skyGrad)"/>
          <!-- Stars -->
          <circle cx="30"  cy="60"  r="1.2" fill="#ffffff" opacity="0.7"/>
          <circle cx="170" cy="40"  r="1"   fill="#ffffff" opacity="0.6"/>
          <circle cx="150" cy="90"  r="0.9" fill="#ffffff" opacity="0.5"/>
          <circle cx="45"  cy="120" r="0.8" fill="#ffffff" opacity="0.5"/>
          <circle cx="180" cy="150" r="1.1" fill="#ffffff" opacity="0.7"/>
          <circle cx="90"  cy="80"  r="0.7" fill="#ffffff" opacity="0.5"/>
          <circle cx="20"  cy="200" r="0.9" fill="#ffffff" opacity="0.55"/>
          <!-- Mountain silhouette -->
          <polygon points="0,500 100,20 200,500" fill="#1a2033" stroke="#2e364b" stroke-width="1"/>
          <!-- Fill driven by JS: height 500 - level -->
          <g clip-path="url(#mountainClip)">
            <rect id="mountainFill" x="0" y="500" width="200" height="0" fill="url(#mountainGrad)"/>
          </g>
          <!-- Climber -->
          <text id="climber" x="100" y="490" text-anchor="middle" font-size="26">🧗</text>
          <!-- Peak flag -->
          <text x="100" y="16" text-anchor="middle" font-size="14">🚩</text>
        </svg>
        <div class="milestone-labels" id="milestoneLabels"></div>
      </div>
      <div class="networth-summary">
        <div class="networth-current">$<span id="networthBig">0</span></div>
        <div class="networth-bar-wrap">
          <div class="networth-bar" id="networthBar"></div>
        </div>
        <div class="networth-goal">of $1,000,000</div>
        <div class="lessons-done"><span id="lessonsDone">0</span> / <span id="lessonsTotal">0</span> lessons</div>
      </div>
    </aside>
  </main>

  <!-- Lesson modal -->
  <div class="lesson-overlay hidden" id="lessonOverlay" aria-hidden="true">
    <div class="lesson-modal">
      <div class="lesson-topbar">
        <button class="close-x" id="closeLesson" aria-label="Close">✕</button>
        <div class="lesson-progress">
          <div class="lesson-progress-fill" id="lessonProgressFill"></div>
        </div>
        <div class="lesson-hearts">
          <span>❤️</span><span id="lessonHearts">5</span>
        </div>
      </div>

      <div class="lesson-body" id="lessonBody">
        <!-- Question rendered here -->
      </div>

      <div class="lesson-footer" id="lessonFooter">
        <div class="feedback" id="feedback"></div>
        <button class="btn-check" id="checkBtn" disabled>CHECK</button>
      </div>
    </div>
  </div>

  <!-- Toast / celebration -->
  <div class="toast hidden" id="toast"></div>

  <!-- Confetti canvas -->
  <canvas id="confettiCanvas"></canvas>

  <script src="data.js"></script>
  <script src="app.js"></script>
</body>
</html>
