<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Denaro · Master Money, Build Wealth</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&display=swap" rel="stylesheet">
</head>
<body>
  <!-- Top nav -->
  <header class="topbar">
    <div class="brand" id="brandHome">
      <span class="brand-mark" aria-hidden="true">
        <svg viewBox="0 0 34 34" width="34" height="34">
          <defs>
            <linearGradient id="brandGrad" x1="0" y1="0" x2="1" y2="1">
              <stop offset="0%"  stop-color="#22c55e"/>
              <stop offset="100%" stop-color="#facc15"/>
            </linearGradient>
          </defs>
          <rect x="1" y="1" width="32" height="32" rx="10" fill="url(#brandGrad)"/>
          <text x="17" y="24" text-anchor="middle" font-family="Nunito, sans-serif" font-weight="900" font-size="20" fill="#0a0e1a">D</text>
        </svg>
      </span>
      <span class="brand-name">Denaro</span>
    </div>
    <nav class="top-actions">
      <button class="btn-reset" id="resetBtn" title="Reset progress">↺</button>
    </nav>
  </header>

  <!-- Main content -->
  <main class="app-main">
    <!-- Left: Unit navigator -->
    <aside class="sidebar-left" id="unitNav" aria-label="Learning units"></aside>

    <!-- Center: Climb strip + unit banner + lesson chart -->
    <section class="content" id="content">
      <div class="center-header">
        <div class="climb-strip">
          <div class="climb-header">
            <div class="climb-title">
              <span class="climb-eyebrow">Climb to</span>
              <span class="climb-goal">$1,000,000</span>
            </div>
            <div class="climb-stats">
              <span class="climb-current">$<span id="climbCurrent">0</span></span>
              <span class="climb-sep">·</span>
              <span class="climb-pct"><span id="climbPct">0</span>%</span>
              <span class="climb-sep">·</span>
              <span class="climb-lessons"><span id="lessonsDone">0</span>/<span id="lessonsTotal">0</span> lessons</span>
            </div>
          </div>
          <div class="climb-rail">
            <div class="climb-track">
              <div class="climb-fill" id="climbFill"></div>
              <div class="climb-climber" id="climbClimber" aria-hidden="true">🧗</div>
            </div>
            <div class="climb-milestones" id="climbMilestones"></div>
          </div>
        </div>
        <div class="unit-banner" id="unitBanner"></div>
      </div>
      <div class="path-container" id="pathContainer"></div>
    </section>
  </main>

  <!-- Lesson modal -->
  <div class="lesson-overlay hidden" id="lessonOverlay" aria-hidden="true">
    <div class="lesson-modal">
      <div class="lesson-topbar">
        <button class="close-x" id="closeLesson" aria-label="Close">✕</button>
        <div class="lesson-progress">
          <div class="lesson-progress-fill" id="lessonProgressFill"></div>
        </div>
      </div>

      <div class="lesson-body" id="lessonBody">
        <!-- Question rendered here -->
      </div>

      <div class="lesson-footer" id="lessonFooter">
        <div class="feedback" id="feedback"></div>
        <button class="btn-check" id="checkBtn" disabled>CHECK</button>
      </div>
    </div>
  </div>

  <!-- Toast / celebration -->
  <div class="toast hidden" id="toast"></div>

  <!-- Confetti canvas -->
  <canvas id="confettiCanvas"></canvas>

  <script src="data.js"></script>
  <script src="app.js"></script>
</body>
</html>
